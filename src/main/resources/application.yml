spring:
  application:
    name: productAPI
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/product-realm
  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

keycloak:
    server-url: http://localhost:9090
    realm: product-realm
    client-id: product-client
    client-secret: 9VidjO4hlKU43LRvadmVNyZQ5pyYVGj7
    admin-username: admin
    admin-password: admin

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  file:
    name: logs/product-api.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  level:
    root: INFO
    com.example.product_api: DEBUG    # Shows your custom logs and logic flow
    org.keycloak: WARN                # Keep Keycloak noise low unless there is an error
    org.hibernate.SQL: DEBUG          # This replaces show-sql: true for better integration
    org.hibernate.orm.jdbc.bind: TRACE # Shows the actual parameters sent to SQL queries